general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = ~/arch-dotfiles/wallpapers/frieren-catppuccin.png
    blur_size = 6
    blur_passes = 3
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Clock
label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgba(166, 173, 200, 1.0)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 300, 55
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(203, 166, 247, 1.0)
    inner_color = rgba(30, 30, 46, 0.9)
    font_color = rgba(205, 214, 244, 1.0)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##a6adc8">󰌾  Password</span>
    hide_input = false
    rounding = 10
    check_color = rgba(166, 227, 161, 1.0)
    fail_color = rgba(243, 139, 168, 1.0)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    fail_transition = 300
    position = 0, -100
    halign = center
    valign = center
}

# User label
label {
    monitor =
    text =   $USER
    color = rgba(166, 173, 200, 1.0)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}
