font_family JetBrains Mono Nerd Font
font_size 14
# vim:ft=kitty

## name:     Poimandres
## upstream: https://github.com/ubmit/poimandres-kitty

# The basic colors
foreground              #a6accd
background              #1b1e28
selection_foreground    none
selection_background    #28344a

# Cursor colors
cursor                  #ffffff
cursor_text_color       #1b1e28

# URL underline color when hovering with mouse
url_color               #5de4c7

# Kitty window border colors
active_border_color     #3d59a1
inactive_border_color   #101014
bell_border_color       #fffac2

# OS Window titlebar colors
wayland_titlebar_color system

# Tab bar colors
active_tab_foreground   #3d59a1
active_tab_background   #16161e
inactive_tab_foreground #787c99
inactive_tab_background #16161e
tab_bar_background      #101014

# The 16 terminal colors

# black
color0  #1b1e28
color8  #a6accd

# red
color1  #d0679d
color9  #d0679d

# green
color2  #5de4c7
color10 #5de4c7

# yellow
color3  #fffac2
color11 #fffac2

# blue
color4  #89ddff
color12 #add7ff

# magenta
color5  #fcc5e9
color13 #fae4fc

# cyan
color6  #add7ff
color14 #89ddff

# white
color7  #ffffff
color15 #ffffff


# --------------------------------------------------
# -- APPEARANCE & UI -------------------------------
# --------------------------------------------------
# Make the background slightly transparent (optional)
# Cursor customization
cursor_shape     block
cursor_blink_interval 0.5
window_margin_width 5
# hide_window_decorations yes

# --------------------------------------------------
# -- FUNCTIONALITY ---------------------------------
# --------------------------------------------------
# Set default shell
shell /usr/bin/zsh

# Initial window size (in columns and rows)
initial_window_width  120c
initial_window_height 30c

# Increase the scrollback buffer to 10,000 lines
scrollback_lines 10000

# Allow remote control for nnn image previews etc.
allow_remote_control yes

# Manually set the socket path (from our debugging session)
listen_on unix:/tmp/kitty


# --------------------------------------------------
# -- KEYMAPS ---------------------------------------
# --------------------------------------------------
# Open URLs with Ctrl+Shift+U
map ctrl+shift+u open_url_with_default_browser

# Clear the terminal screen with Ctrl+Shift+K
map ctrl+shift+k clear_terminal scrollback active/

tab_bar_min_tabs            1
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}